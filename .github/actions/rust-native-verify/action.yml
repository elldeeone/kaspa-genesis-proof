name: Rust Native Verify
description: Run formatter, clippy, and the Rust verifier test suite.

inputs:
  deep-tests:
    description: Run ignored deep proof and CLI verification tests.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      shell: bash
      run: cargo fmt --check

    - name: Run clippy
      shell: bash
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Run fast test suite
      shell: bash
      run: cargo test --locked

    - name: Run deep test suite
      if: ${{ inputs.deep-tests == 'true' }}
      shell: bash
      run: cargo test --locked -- --ignored
